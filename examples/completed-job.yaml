apiVersion: batch/v1
kind: Job
metadata:
  name: yk-demo-completed
  namespace: batch
spec:
  backoffLimit: 0
  parallelism: 3
  completions: 3
  template:
    metadata:
      labels:
        applicationId: app-demo-completed-001
        queue: root.batch
        yunikorn.apache.org/app-id: app-demo-completed-001
      annotations:
        yunikorn.apache.org/app-id: app-demo-completed-001
        yunikorn.apache.org/queue: root.batch
    spec:
      schedulerName: yunikorn
      restartPolicy: Never
      containers:
        - name: sleep
          image: busybox:1.36
          command: ["sh", "-c", "sleep 15"]
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
