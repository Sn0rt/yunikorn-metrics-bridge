apiVersion: v1
kind: Pod
metadata:
  name: yk-demo-pending
  namespace: pending
  labels:
    applicationId: app-demo-pending-001
    queue: root.pending
    yunikorn.apache.org/app-id: app-demo-pending-001
  annotations:
    yunikorn.apache.org/app-id: app-demo-pending-001
    yunikorn.apache.org/queue: root.pending
spec:
  schedulerName: yunikorn
  restartPolicy: Never
  nodeSelector:
    non-existent-node-label: "true"
  containers:
    - name: sleep
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      resources:
        requests:
          cpu: "250m"
          memory: "128Mi"
        limits:
          cpu: "250m"
          memory: "128Mi"
