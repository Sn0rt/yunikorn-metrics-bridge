apiVersion: batch/v1
kind: Job
metadata:
  name: yk-demo-analytics-completed
  namespace: analytics
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        applicationId: app-demo-analytics-completed-001
        queue: root.analytics
        yunikorn.apache.org/app-id: app-demo-analytics-completed-001
      annotations:
        yunikorn.apache.org/app-id: app-demo-analytics-completed-001
        yunikorn.apache.org/queue: root.analytics
    spec:
      schedulerName: yunikorn
      restartPolicy: Never
      containers:
        - name: sleep
          image: busybox:1.36
          command: ["sh", "-c", "sleep 10"]
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
