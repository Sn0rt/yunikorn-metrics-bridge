apiVersion: apps/v1
kind: Deployment
metadata:
  name: yk-demo-analytics
  namespace: analytics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: yk-demo-analytics
  template:
    metadata:
      labels:
        app: yk-demo-analytics
        applicationId: app-demo-analytics-001
        queue: root.analytics
        yunikorn.apache.org/app-id: app-demo-analytics-001
      annotations:
        yunikorn.apache.org/app-id: app-demo-analytics-001
        yunikorn.apache.org/queue: root.analytics
    spec:
      schedulerName: yunikorn
      restartPolicy: Always
      containers:
        - name: sleep
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
