configuration:
  config: |
    modules:
      yunikorn_active_apps:
        metrics:
          - name: yunikorn_app_info
            type: object
            help: "YuniKorn active application info"
            path: '{[*]}'
            labels:
              application_id: '{.applicationID}'
              partition: '{.partition}'
              queue: '{.queueName}'
            values:
              value: 1

          - name: yunikorn_app_used_memory_bytes
            type: object
            help: "YuniKorn active application used memory in bytes"
            path: '{[?(@.usedResource.memory)]}'
            labels:
              application_id: '{.applicationID}'
              partition: '{.partition}'
              queue: '{.queueName}'
            values:
              value: '{.usedResource.memory}'

          - name: yunikorn_app_used_cpu_millicores
            type: object
            help: "YuniKorn active application used CPU in millicores"
            path: '{[?(@.usedResource.vcore)]}'
            labels:
              application_id: '{.applicationID}'
              partition: '{.partition}'
              queue: '{.queueName}'
            values:
              value: '{.usedResource.vcore}'

          - name: yunikorn_app_used_pods
            type: object
            help: "YuniKorn active application used pods"
            path: '{[*]}'
            labels:
              application_id: '{.applicationID}'
              partition: '{.partition}'
              queue: '{.queueName}'
            values:
              value: '{.usedResource.pods}'

          - name: yunikorn_app_max_used_memory_bytes
            type: object
            help: "YuniKorn active application max used memory in bytes"
            path: '{[?(@.maxUsedResource.memory)]}'
            labels:
              application_id: '{.applicationID}'
              partition: '{.partition}'
              queue: '{.queueName}'
            values:
              value: '{.maxUsedResource.memory}'

          - name: yunikorn_app_max_used_cpu_millicores
            type: object
            help: "YuniKorn active application max used CPU in millicores"
            path: '{[?(@.maxUsedResource.vcore)]}'
            labels:
              application_id: '{.applicationID}'
              partition: '{.partition}'
              queue: '{.queueName}'
            values:
              value: '{.maxUsedResource.vcore}'

          - name: yunikorn_app_max_used_pods
            type: object
            help: "YuniKorn active application max used pods"
            path: '{[*]}'
            labels:
              application_id: '{.applicationID}'
              partition: '{.partition}'
              queue: '{.queueName}'
            values:
              value: '{.maxUsedResource.pods}'

          - name: yunikorn_app_submission_timestamp_nanoseconds
            type: object
            help: "YuniKorn active application submission timestamp in nanoseconds"
            path: '{[*]}'
            labels:
              application_id: '{.applicationID}'
              partition: '{.partition}'
              queue: '{.queueName}'
            values:
              value: '{.submissionTime}'

          - name: yunikorn_app_start_timestamp_milliseconds
            type: object
            help: "YuniKorn active application start timestamp in milliseconds"
            path: '{[*]}'
            labels:
              application_id: '{.applicationID}'
              partition: '{.partition}'
              queue: '{.queueName}'
            values:
              value: '{.startTime}'

          - name: yunikorn_app_accepted_timestamp_nanoseconds
            type: object
            help: "YuniKorn active application accepted timestamp in nanoseconds"
            path: '{[*]}'
            labels:
              application_id: '{.applicationID}'
              partition: '{.partition}'
              queue: '{.queueName}'
            values:
              value: '{.stateLog[0].time}'

          - name: yunikorn_app_running_timestamp_nanoseconds
            type: object
            help: "YuniKorn active application running timestamp in nanoseconds"
            path: '{[*]}'
            labels:
              application_id: '{.applicationID}'
              partition: '{.partition}'
              queue: '{.queueName}'
            values:
              value: '{.stateLog[1].time}'

          - name: yunikorn_app_allocation_request_timestamp_nanoseconds
            type: object
            help: "YuniKorn active application first allocation request timestamp in nanoseconds"
            path: '{[?(@.allocations[0].requestTime)]}'
            labels:
              application_id: '{.applicationID}'
              partition: '{.partition}'
              queue: '{.queueName}'
              namespace: '{.allocations[0].allocationTags.kubernetes\.io/meta/namespace}'
              pod_name: '{.allocations[0].allocationTags.kubernetes\.io/meta/podName}'
            values:
              value: '{.allocations[0].requestTime}'

          - name: yunikorn_app_first_allocation_timestamp_nanoseconds
            type: object
            help: "YuniKorn active application first allocation timestamp in nanoseconds"
            path: '{[?(@.allocations[0].allocationTime)]}'
            labels:
              application_id: '{.applicationID}'
              partition: '{.partition}'
              queue: '{.queueName}'
              namespace: '{.allocations[0].allocationTags.kubernetes\.io/meta/namespace}'
              pod_name: '{.allocations[0].allocationTags.kubernetes\.io/meta/podName}'
            values:
              value: '{.allocations[0].allocationTime}'

          - name: yunikorn_app_primary_allocation_memory_bytes
            type: object
            help: "YuniKorn active application primary allocation memory in bytes"
            path: '{[?(@.allocations[0].resource.memory)]}'
            labels:
              application_id: '{.applicationID}'
              partition: '{.partition}'
              queue: '{.queueName}'
              namespace: '{.allocations[0].allocationTags.kubernetes\.io/meta/namespace}'
              pod_name: '{.allocations[0].allocationTags.kubernetes\.io/meta/podName}'
            values:
              value: '{.allocations[0].resource.memory}'

          - name: yunikorn_app_primary_allocation_cpu_millicores
            type: object
            help: "YuniKorn active application primary allocation CPU in millicores"
            path: '{[?(@.allocations[0].resource.vcore)]}'
            labels:
              application_id: '{.applicationID}'
              partition: '{.partition}'
              queue: '{.queueName}'
              namespace: '{.allocations[0].allocationTags.kubernetes\.io/meta/namespace}'
              pod_name: '{.allocations[0].allocationTags.kubernetes\.io/meta/podName}'
            values:
              value: '{.allocations[0].resource.vcore}'

          - name: yunikorn_app_primary_allocation_pods
            type: object
            help: "YuniKorn active application primary allocation pods"
            path: '{[?(@.allocations[0].resource.pods)]}'
            labels:
              application_id: '{.applicationID}'
              partition: '{.partition}'
              queue: '{.queueName}'
              namespace: '{.allocations[0].allocationTags.kubernetes\.io/meta/namespace}'
              pod_name: '{.allocations[0].allocationTags.kubernetes\.io/meta/podName}'
            values:
              value: '{.allocations[0].resource.pods}'

      yunikorn_partitions:
        metrics:
          - name: yunikorn_partition_info
            type: object
            help: "YuniKorn partition info"
            path: '{[*]}'
            labels:
              partition: '{.name}'
              cluster_id: '{.clusterId}'
              state: '{.state}'
              node_sorting_policy: '{.nodeSortingPolicy.type}'
            values:
              value: 1

          - name: yunikorn_partition_preemption_enabled
            type: object
            help: "YuniKorn partition preemption enabled"
            path: '{[*]}'
            labels:
              partition: '{.name}'
            values:
              value: '{.preemptionEnabled}'

          - name: yunikorn_partition_quota_preemption_enabled
            type: object
            help: "YuniKorn partition quota preemption enabled"
            path: '{[*]}'
            labels:
              partition: '{.name}'
            values:
              value: '{.quotaPreemptionEnabled}'

          - name: yunikorn_partition_total_nodes
            type: object
            help: "YuniKorn partition total nodes"
            path: '{[*]}'
            labels:
              partition: '{.name}'
            values:
              value: '{.totalNodes}'

          - name: yunikorn_partition_total_containers
            type: object
            help: "YuniKorn partition total containers"
            path: '{[*]}'
            labels:
              partition: '{.name}'
            values:
              value: '{.totalContainers}'

          - name: yunikorn_partition_applications
            type: object
            help: "YuniKorn partition applications by state"
            path: '{[*]}'
            labels:
              partition: '{.name}'
              application_state: total
            values:
              value: '{.applications.total}'

          - name: yunikorn_partition_applications
            type: object
            help: "YuniKorn partition applications by state"
            path: '{[*]}'
            labels:
              partition: '{.name}'
              application_state: Running
            values:
              value: '{.applications.Running}'

          - name: yunikorn_partition_capacity_memory_bytes
            type: object
            help: "YuniKorn partition capacity memory in bytes"
            path: '{[*]}'
            labels:
              partition: '{.name}'
            values:
              value: '{.capacity.capacity.memory}'

          - name: yunikorn_partition_capacity_cpu_millicores
            type: object
            help: "YuniKorn partition capacity CPU in millicores"
            path: '{[*]}'
            labels:
              partition: '{.name}'
            values:
              value: '{.capacity.capacity.vcore}'

          - name: yunikorn_partition_capacity_pods
            type: object
            help: "YuniKorn partition capacity pods"
            path: '{[*]}'
            labels:
              partition: '{.name}'
            values:
              value: '{.capacity.capacity.pods}'

          - name: yunikorn_partition_capacity_ephemeral_storage_bytes
            type: object
            help: "YuniKorn partition capacity ephemeral storage in bytes"
            path: '{[*]}'
            labels:
              partition: '{.name}'
            values:
              value: '{.capacity.capacity.ephemeral-storage}'

          - name: yunikorn_partition_used_memory_bytes
            type: object
            help: "YuniKorn partition used memory in bytes"
            path: '{[*]}'
            labels:
              partition: '{.name}'
            values:
              value: '{.capacity.usedCapacity.memory}'

          - name: yunikorn_partition_used_cpu_millicores
            type: object
            help: "YuniKorn partition used CPU in millicores"
            path: '{[*]}'
            labels:
              partition: '{.name}'
            values:
              value: '{.capacity.usedCapacity.vcore}'

          - name: yunikorn_partition_used_pods
            type: object
            help: "YuniKorn partition used pods"
            path: '{[*]}'
            labels:
              partition: '{.name}'
            values:
              value: '{.capacity.usedCapacity.pods}'

          - name: yunikorn_partition_utilization_memory_percent
            type: object
            help: "YuniKorn partition memory utilization percent"
            path: '{[*]}'
            labels:
              partition: '{.name}'
            values:
              value: '{.capacity.utilization.memory}'

          - name: yunikorn_partition_utilization_cpu_percent
            type: object
            help: "YuniKorn partition CPU utilization percent"
            path: '{[*]}'
            labels:
              partition: '{.name}'
            values:
              value: '{.capacity.utilization.vcore}'

          - name: yunikorn_partition_utilization_pods_percent
            type: object
            help: "YuniKorn partition pods utilization percent"
            path: '{[*]}'
            labels:
              partition: '{.name}'
            values:
              value: '{.capacity.utilization.pods}'

          - name: yunikorn_partition_last_state_transition_timestamp_nanoseconds
            type: object
            help: "YuniKorn partition last state transition timestamp in nanoseconds"
            path: '{[*]}'
            labels:
              partition: '{.name}'
            values:
              value: '{.lastStateTransitionTime}'

      yunikorn_queues:
        metrics:
          - name: yunikorn_queue_info
            type: object
            help: "YuniKorn queue info"
            path: '{..children[?(@.queuename)]}'
            labels:
              queue: '{.queuename}'
              parent: '{.parent}'
              partition: default
              status: '{.status}'
              sorting_policy: '{.sortingPolicy}'
              preemption_delay: '{.preemptionDelay}'
              quota_preemption_delay: '{.quotaPreemptionDelay}'
              is_leaf: '{.isLeaf}'
              is_managed: '{.isManaged}'
              priority_sorting: '{.prioritySorting}'
              is_preemption_fence: '{.isPreemptionFence}'
              is_priority_fence: '{.isPriorityFence}'
            values:
              value: 1

          - name: yunikorn_queue_running_apps
            type: object
            help: "YuniKorn queue running applications"
            path: '{..children[?(@.runningApps)]}'
            labels:
              queue: '{.queuename}'
              parent: '{.parent}'
              partition: default
            values:
              value: '{.runningApps}'

          - name: yunikorn_queue_allocated_memory_bytes
            type: object
            help: "YuniKorn queue allocated memory in bytes"
            path: '{..children[?(@.allocatedResource.memory)]}'
            labels:
